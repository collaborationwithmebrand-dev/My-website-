<button onclick="exportWebsite()" style="background:#27ae60;">
EXPORT & PUBLISH WEBSITE
</button>
<script>
function exportWebsite(){

  let fullHTML = document.documentElement.outerHTML;

  let blob = new Blob([fullHTML], {type: "text/html"});
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "Jhaji-Coaching-Published.html";
  link.click();

  alert("Website file downloaded! Now upload it to Replit and deploy.");
}
</script>
